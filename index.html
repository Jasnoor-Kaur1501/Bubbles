<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desk Pet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="stats-panel">
            <h1>Desk Pet</h1>
            <div class="stat">
                <label>Hunger:</label>
                <div class="stat-bar">
                    <div class="stat-fill hunger-fill" id="hungerBar"></div>
                </div>
                <span id="hungerValue">100</span>
            </div>
            <div class="stat">
                <label>Energy:</label>
                <div class="stat-bar">
                    <div class="stat-fill energy-fill" id="energyBar"></div>
                </div>
                <span id="energyValue">100</span>
            </div>
            <div class="stat">
                <label>Happiness:</label>
                <div class="stat-bar">
                    <div class="stat-fill happiness-fill" id="happinessBar"></div>
                </div>
                <span id="happinessValue">100</span>
            </div>
            <div class="stat">
                <label>Level:</label>
                <span id="levelValue">1</span>
            </div>
            <div class="controls">
                <button id="feedBtn" class="btn">🍖 Feed</button>
                <button id="playBtn" class="btn">🎮 Play</button>
                <button id="petBtn" class="btn">👋 Pet</button>
            </div>
        </div>

        <div class="game-area">
            <div class="pet" id="pet">🐥</div>
            <div class="sleep-bubble" id="sleepBubble">💤</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
